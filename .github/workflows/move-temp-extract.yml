name: Move temp_extract to root

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Move contents out of temp_extract
        run: |
          if [ ! -d "temp_extract" ]; then
            echo "Folder temp_extract tidak ditemukan, tidak ada yang perlu dipindah."
            exit 0
          fi
          shopt -s dotglob nullglob
          cp -rn temp_extract/* . 2>/dev/null || true
          rm -rf temp_extract
          echo "Selesai memindahkan isi temp_extract ke root."

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Move temp_extract contents to root" || echo "Nothing to commit"
          git push
