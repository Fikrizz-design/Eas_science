name: Extract Zip

on:
  workflow_dispatch:
    inputs:
      zip_file:
        description: 'Nama file zip yang mau di-extract'
        required: true
        default: 'eas-education-main.zip'

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract zip
        run: |
          unzip -o "${{ github.event.inputs.zip_file }}" -d temp_extract
          # cek isi folder hasil extract, lalu pindahkan ke root
          
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Extract project files via Action" || echo "Nothing to commit"
          git push
